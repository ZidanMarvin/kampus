<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITATAS FIX — Daftar Akun</title>
<link rel="stylesheet" href="_clean.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
.auth-card { width: 100%; max-width: 480px; }
.hero-strip {
  background: linear-gradient(135deg, var(--navy) 0%, #243970 100%);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 1.75rem 2rem 1.5rem;
  text-align: center;
  color: #fff;
}
.hero-strip .logo {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 1.7rem;
  letter-spacing: -0.01em;
}
.hero-strip .logo span { color: #6ee7e7; }
.hero-strip p { font-size: 12px; opacity: 0.6; margin-top: 4px; }
.card-body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  padding: 2rem;
  box-shadow: var(--shadow);
}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">

    <div class="hero-strip">
      <div class="logo">ITATAS<span>Fix</span></div>
      <p>Buat akun baru untuk mulai melapor</p>
    </div>

    <div class="card-body">
      <h3 style="font-size:1rem;margin-bottom:1.25rem;color:var(--navy);">Pendaftaran Akun</h3>

      <form action="register.php" method="POST">

        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" name="nama" class="form-control" placeholder="Masukkan nama lengkap" required>
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="user@kampus.ac.id" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Minimal 6 karakter" required minlength="6">
        </div>

        <div class="form-group">
          <label class="form-label">Pilih Role</label>
          <div class="role-grid">
            <div>
              <input type="radio" name="role" value="mahasiswa" id="r1" class="role-option" checked>
              <label for="r1" class="role-label">
                <i class="ti ti-school"></i>
                Mahasiswa
              </label>
            </div>
            <div>
              <input type="radio" name="role" value="teknisi" id="r2" class="role-option">
              <label for="r2" class="role-label">
                <i class="ti ti-tool"></i>
                Teknisi
              </label>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <button type="submit" class="btn btn-teal btn-block mb-2">
          <i class="ti ti-user-plus"></i> Daftar Sekarang
        </button>

        <p class="text-center fs-13 text-muted mt-2">
          Sudah punya akun? <a href="login.html" class="link">Masuk</a>
        </p>

      </form>
    </div>

  </div>
</div>
</body>
</html>
